<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | ResolveX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    display: flex;
    height: 100vh;
    background: #0f172a;
    color: white;
    overflow: hidden;
}

/* ✨ ANIMATIONS */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

/* LEFT PANEL */
.left {
    flex: 1;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    animation: float 6s ease-in-out infinite;
}

.logo-box {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}

.logo-icon {
    width: 60px;
    height: 60px;
    background: rgba(255,255,255,0.2);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 22px;
    transition: 0.3s;
}

.logo-icon:hover {
    transform: rotate(10deg) scale(1.1);
}

.logo-text {
    font-size: 30px;
    font-weight: 600;
}

.left p {
    opacity: 0.9;
    font-size: 14px;
}

/* RIGHT PANEL */
.right {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN BOX */
.box {
    width: 380px;
    padding: 30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.1);
    animation: fadeIn 0.8s ease;
    transition: 0.3s;
}

.box:hover {
    transform: scale(1.02);
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
    transition: 0.3s;
}

input:focus {
    outline: none;
    box-shadow: 0 0 10px #38bdf8;
    transform: scale(1.02);
}

/* PASSWORD BOX */
.password-box {
    position: relative;
}

.toggle {
    position: absolute;
    right: 10px;
    top: 14px;
    cursor: pointer;
    font-size: 12px;
    color: #94a3b8;
    transition: 0.3s;
}

.toggle:hover {
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: white;
    cursor: pointer;
    font-size: 15px;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

/* BUTTON SHINE */
button::after {
    content: "";
    position: absolute;
    width: 0;
    height: 100%;
    left: 0;
    top: 0;
    background: rgba(255,255,255,0.2);
    transition: 0.4s;
}

button:hover::after {
    width: 100%;
}

button:hover {
    transform: translateY(-2px);
}

/* MESSAGE */
.message {
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-size: 14px;
    animation: fadeIn 0.5s ease;
}

.error { background: rgba(239,68,68,0.2); }
.success { background: rgba(34,197,94,0.2); }

/* LINK */
.link {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #94a3b8;
    transition: 0.3s;
}

.link:hover {
    color: white;
    letter-spacing: 0.5px;
}

/* BACKGROUND GLOW */
body::before {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(56,189,248,0.25), transparent);
    top: -100px;
    left: -100px;
    z-index: -1;
    animation: float 8s infinite ease-in-out;
}

/* RESPONSIVE */
@media(max-width:768px){
    .left {
        display: none;
    }
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">
    <div class="logo-box">
        <div class="logo-icon">RX</div>
        <div class="logo-text">ResolveX</div>
    </div>
    <p>Smart Complaint Management System</p>
</div>

<!-- RIGHT -->
<div class="right">
<div class="box">

    <h2>Welcome Back 👋</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username"
               value="{{ request.POST.username }}" required>

        <div class="password-box">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <span class="toggle" onclick="togglePassword()">Show</span>
        </div>

        <button type="submit">Login</button>
    </form>

    <a href="{% url 'register' %}" class="link">
        Don't have an account? Register
    </a>

</div>
</div>

<script>
function togglePassword() {
    let pass = document.getElementById("password");
    let toggle = document.querySelector(".toggle");

    if (pass.type === "password") {
        pass.type = "text";
        toggle.innerText = "Hide";
    } else {
        pass.type = "password";
        toggle.innerText = "Show";
    }
}
</script>

</body>
</html>
